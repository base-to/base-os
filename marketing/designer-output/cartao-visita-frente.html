<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1050px;
      height: 600px;
      overflow: hidden;
      display: flex;
      font-family: 'Lato', sans-serif;
    }

    /* Painel esquerdo — Charcoal */
    .left {
      width: 390px;
      height: 600px;
      background: #3D2B1F;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 52px 48px;
    }

    .logo {
      margin-bottom: 28px;
    }

    .clinic-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 60px;
      color: #F5EFE6;
      line-height: 1.0;
      letter-spacing: -0.01em;
    }

    .specialty {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 20px;
      color: #7C9A7C;
      margin-top: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Painel direito — Creme */
    .right {
      flex: 1;
      background: #F5EFE6;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 52px;
      position: relative;
    }

    .accent-bar {
      width: 40px;
      height: 3px;
      background: #B87333;
      margin-bottom: 32px;
    }

    .contact-block {
      margin-bottom: 24px;
    }

    .contact-label {
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #B87333;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 6px;
    }

    .contact-value {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-size: 22px;
      color: #3D2B1F;
      line-height: 1.55;
    }

    /* Barra inferior decorativa */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(to right, #7C9A7C 0%, #B87333 100%);
    }
  </style>
</head>
<body>

  <div class="left">
    <div class="logo">
      <svg viewBox="0 0 140 90" width="100" height="64" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="80" x2="130" y2="80" stroke="#F5EFE6" stroke-width="2.5"/>
        <path d="M 30 80 A 40 40 0 0 1 110 80" stroke="#F5EFE6" stroke-width="3.5" fill="none"/>
        <path d="M 45 80 A 25 25 0 0 1 95 80" stroke="#7C9A7C" stroke-width="3.5" fill="none"/>
        <path d="M 58 80 A 12 12 0 0 1 82 80" stroke="#B87333" stroke-width="3.5" fill="none"/>
      </svg>
    </div>
    <div class="clinic-name">Clínica<br>BASE</div>
    <div class="specialty">Terapia Ocupacional</div>
  </div>

  <div class="right">
    <div class="accent-bar"></div>

    <div class="contact-block">
      <div class="contact-label">Telefone</div>
      <div class="contact-value">(11) 97724-9842</div>
    </div>

    <div class="contact-block">
      <div class="contact-label">Endereço</div>
      <div class="contact-value">
        Av. Rudolf Dafferner, 400<br>
        Sala 314b, Bloco Madrid<br>
        Boa Vista, Sorocaba / SP<br>
        CEP 18085-005
      </div>
    </div>

    <div class="bottom-bar"></div>
  </div>

</body>
</html>
