<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clínica Base — Mockup Instagram Claro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --charcoal: #3D2B1F;
    --creme: #F5EFE6;
    --cobre: #B87333;
    --preto: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e5e5e5;
    font-family: 'Lato', sans-serif;
    padding: 40px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--charcoal);
    margin-bottom: 16px;
  }
  .post {
    width: 540px;
    height: 540px;
    background: var(--creme);
    color: var(--charcoal);
    padding: 48px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: var(--charcoal);
    line-height: 1;
  }
  .logo .lettermark {
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  .logo .lettermark .b-init {
    font-size: 110%;
  }
  .logo .name {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--cobre);
    margin-top: 4px;
    text-transform: uppercase;
  }
  .body-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1.18;
    color: var(--charcoal);
    letter-spacing: -0.015em;
    margin-bottom: 16px;
  }
  .subhead {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 14px;
    line-height: 1.55;
    color: var(--charcoal);
    max-width: 420px;
  }
  .footer {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .separator {
    width: 56px;
    height: 2px;
    background: var(--cobre);
  }
  .cta {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cobre);
  }
  .footer-info {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.05em;
    color: var(--charcoal);
    opacity: 0.75;
  }
  .footer-info .sep { color: var(--cobre); margin: 0 6px; }
</style>
</head>
<body>
  <div class="label">Mockup Instagram · 1080x1080 (renderizado em 540x540)</div>

  <div class="post">
    <div class="logo">
      <div class="lettermark"><span class="b-init">B</span>.A.S.E.</div>
      <div class="name">Clínica Base</div>
    </div>

    <div class="body-area">
      <div class="headline">A mãe entende a criança antes do laudo entender.</div>
      <div class="subhead">O coach parental do Método B.A.S.E. transforma essa intuição em sistema replicável em casa.</div>
    </div>

    <div class="footer">
      <div class="separator"></div>
      <div class="cta">Saiba mais na bio</div>
      <div class="footer-info">
        Clínica Base<span class="sep">·</span>Terapia Ocupacional<span class="sep">·</span>Sorocaba, SP
      </div>
    </div>
  </div>
</body>
</html>
