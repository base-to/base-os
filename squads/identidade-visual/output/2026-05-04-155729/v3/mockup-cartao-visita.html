<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clínica Base — Cartão de Visita (Conceito I)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --charcoal: #3D2B1F;
    --creme: #F5EFE6;
    --cobre: #B87333;
    --salvia: #7C9A7C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e5e5e5;
    font-family: 'Lato', sans-serif;
    padding: 60px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }
  .label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--charcoal);
  }
  .row {
    display: flex;
    gap: 32px;
  }
  .card {
    width: 540px;
    height: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
    overflow: hidden;
  }
  /* Frente */
  .front {
    background: var(--creme);
    color: var(--charcoal);
    padding: 32px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .front .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .front .logo-symbol { display: block; }
  .front .brandname {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--charcoal);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .front .brandname .sub {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--cobre);
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }
  .front .info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .front .nome {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--charcoal);
    line-height: 1.1;
  }
  .front .titulo {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--charcoal);
  }
  .front .crefito {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 11px;
    color: var(--charcoal);
    opacity: 0.75;
  }
  .front .sep-line {
    height: 1px;
    background: var(--cobre);
    width: 100%;
    margin: 12px 0 8px;
  }
  .front .contato {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 11px;
    color: var(--charcoal);
  }
  .front .contato .sep { color: var(--cobre); margin: 0 6px; }

  /* Verso */
  .back {
    background: var(--charcoal);
    color: var(--creme);
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }
  .back .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    color: var(--creme);
    line-height: 1.3;
    max-width: 380px;
  }
  .back .deco-line {
    width: 56px;
    height: 1px;
    background: var(--cobre);
    margin-top: 18px;
  }
  .back .logo-bottom {
    position: absolute;
    bottom: 24px;
    right: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .back .logo-bottom .brandname-mini {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--creme);
    line-height: 1;
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>
  <div class="label">Cartão de Visita · Conceito I · 90x50mm · Frente e Verso</div>

  <div class="row">
    <!-- Frente -->
    <div class="card front">
      <div class="logo">
        <svg class="logo-symbol" viewBox="0 0 140 90" width="68" height="44">
          <line x1="10" y1="80" x2="130" y2="80" stroke="#3D2B1F" stroke-width="2.5"/>
          <path d="M 30 80 A 40 40 0 0 1 110 80" stroke="#3D2B1F" stroke-width="3.5" fill="none"/>
          <path d="M 45 80 A 25 25 0 0 1 95 80" stroke="#7C9A7C" stroke-width="3.5" fill="none"/>
          <path d="M 58 80 A 12 12 0 0 1 82 80" stroke="#B87333" stroke-width="3.5" fill="none"/>
        </svg>
        <div class="brandname">
          Clínica Base
          <span class="sub">Terapia Ocupacional</span>
        </div>
      </div>
      <div class="info">
        <div class="nome">Regiane Vidal</div>
        <div class="titulo">Terapeuta Ocupacional</div>
        <div class="crefito">CREFITO-3 11824-TO</div>
        <div class="sep-line"></div>
        <div class="contato">(15) 99999-9999<span class="sep">·</span>clinicabase.com.br</div>
      </div>
    </div>

    <!-- Verso -->
    <div class="card back">
      <div class="tagline">"Você é a base do seu filho."</div>
      <div class="deco-line"></div>
      <div class="logo-bottom">
        <svg viewBox="0 0 140 90" width="38" height="24">
          <line x1="10" y1="80" x2="130" y2="80" stroke="#F5EFE6" stroke-width="3"/>
          <path d="M 30 80 A 40 40 0 0 1 110 80" stroke="#F5EFE6" stroke-width="4" fill="none"/>
          <path d="M 45 80 A 25 25 0 0 1 95 80" stroke="#7C9A7C" stroke-width="4" fill="none"/>
          <path d="M 58 80 A 12 12 0 0 1 82 80" stroke="#B87333" stroke-width="4" fill="none"/>
        </svg>
        <div class="brandname-mini">Clínica Base</div>
      </div>
    </div>
  </div>
</body>
</html>
