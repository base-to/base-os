# Design output — gerado pela fase de Design
# Squad: identidade-visual | Clínica Base

squad:
  code: "identidade-visual"
  name: "Identidade Visual — Clínica Base"
  description: "Cria a identidade visual completa da Clínica Base: logo, paleta de cores, tipografia e branding kit"

agents:
  - id: "identidade-visual/agents/beatriz-branding"
    name: "Beatriz Branding"
    title: "Estrategista de Marca"
    icon: "🧭"
    execution: "inline"
    skills: []
    tasks:
      - name: "definir-estrategia-de-marca"
        file: "tasks/definir-estrategia-de-marca.md"
        description: "Define o posicionamento, arquétipo, personalidade e tagline da marca"
    artifacts:
      voice_guidance:
        always_use:
          - term: "arquétipo de marca"
            why: "Enquadra a personalidade da marca em um framework validado (Cuidador + Sábio)"
          - term: "posicionamento diferenciado"
            why: "A marca precisa se destacar das clínicas genéricas do setor"
          - term: "pilares da marca"
            why: "Os 4 pilares do Método B.A.S.E. são âncoras estratégicas visuais e verbais"
          - term: "proposta de valor"
            why: "Clareza sobre o que diferencia a Clínica Base é o ponto de partida de tudo"
          - term: "tom de voz"
            why: "A consistência verbal é tão importante quanto a consistência visual"
          - term: "mãe protagonista"
            why: "É o diferencial central do Método B.A.S.E. — deve aparecer na estratégia"
        never_use:
          - term: "clínica comum"
            why: "Linguagem genérica apaga a diferenciação"
          - term: "qualidade acima de tudo"
            why: "Frase vazia sem substância — não diferencia nem posiciona"
          - term: "para todos os públicos"
            why: "Posicionamento amplo = posicionamento nenhum"
        tone_rules:
          - "Falar para mães de crianças com TEA/TDAH como especialista que entende o cotidiano delas"
          - "Posicionamento deve soar como autoridade acessível — não clínico frio, não pastel superficial"
      anti_patterns:
        never_do:
          - "Escolher arquétipo Herói ou Governante: errado para contexto de saúde pediátrica — cria distância em vez de conexão"
          - "Copiar posicionamento de competidores: diferenciação exige identificar o gap, não preencher o mesmo espaço"
          - "Propor tagline genérica como 'Cuidado com amor': não diferencia, não informa, não posiciona"
          - "Ignorar o Método B.A.S.E. no posicionamento: é o principal ativo de diferenciação da marca"
        always_do:
          - "Âncoras o posicionamento na transformação prometida, não no serviço prestado"
          - "Testar a tagline pela clareza: uma pessoa de fora do setor deve entender o que a clínica faz"
          - "Alinhar cada elemento estratégico ao arquétipo escolhido (Cuidador + Sábio)"
      quality_criteria:
        - "Arquétipo primário é Cuidador e secundário é Sábio — não Hero, Ruler ou Jester"
        - "Tagline contém referência ao desenvolvimento infantil ou ao método B.A.S.E."
        - "Posicionamento articula claramente por que a Clínica Base é diferente de outras clínicas de TO"
        - "Estratégia menciona explicitamente a mãe como protagonista"
        - "Pilares B.A.S.E. (Brincar, Afeto, Sensorial, Estimulação) estão refletidos na personalidade da marca"

  - id: "identidade-visual/agents/vitor-visual"
    name: "Vitor Visual"
    title: "Designer Visual"
    icon: "🎨"
    execution: "inline"
    skills:
      - canva
      - image-ai-generator
      - image-creator
    tasks:
      - name: "criar-conceitos-de-logo"
        file: "tasks/criar-conceitos-de-logo.md"
        description: "Gera 3 conceitos de logo usando Canva e/ou image-ai-generator"
      - name: "definir-paleta-e-tipografia"
        file: "tasks/definir-paleta-e-tipografia.md"
        description: "Define paleta de cores com hex codes e par tipográfico com specimen"
      - name: "renderizar-mockup"
        file: "tasks/renderizar-mockup.md"
        description: "Renderiza mockup visual completo mostrando logo + paleta + tipografia juntos"
    artifacts:
      voice_guidance:
        always_use:
          - term: "sistema de design"
            why: "Define consistência antes de criar — cores, fontes, espaçamento como sistema"
          - term: "paleta primária/secundária/accent"
            why: "Nomenclatura técnica correta para o sistema de cores"
          - term: "hex code"
            why: "Precisão técnica — sempre entregar valores exatos (#XXXXXX)"
          - term: "hierarquia visual"
            why: "Todo design precisa de ordem de leitura clara"
          - term: "par tipográfico"
            why: "Máximo 2 famílias de fonte — heading + body"
          - term: "razão de contraste WCAG"
            why: "Acessibilidade e legibilidade são obrigatorias"
        never_use:
          - term: "azul hospitalar + branco clínico"
            why: "Padrão genérico que não diferencia e associa a hospital frio"
          - term: "pastel infantil"
            why: "Dominante no setor pediátrico — usar é ser invisível"
          - term: "mais ou menos X px"
            why: "Valores de design são sempre exatos — sem aproximações"
        tone_rules:
          - "Toda escolha visual tem justificativa: cor, fonte, forma — nada é estético por acaso"
          - "Apresentar 3 conceitos distintos para o logo — não variações do mesmo conceito"
      anti_patterns:
        never_do:
          - "Usar símbolo de criança cartoon no logo: genérico demais para o setor, não projeta profissionalismo"
          - "Usar árvore como símbolo principal: já usada por Centro Baobá e centenas de clínicas"
          - "Usar vermelho na paleta: associado a urgência/alarme — errado para clínica pediátrica de desenvolvimento"
          - "Misturar mais de 5 cores no sistema: cria ruído visual, não coerência de marca"
          - "Usar script/cursiva como fonte primária: legibilidade reduzida, pouca autoridade visual"
        always_do:
          - "Documentar o sistema de design antes de gerar qualquer ativo visual"
          - "Verificar contraste WCAG 4.5:1 para todo texto sobre fundo colorido"
          - "Entregar logo em fundo claro E fundo escuro — ambas as versões"
      quality_criteria:
        - "3 conceitos de logo entregues com descrição do conceito por trás de cada um"
        - "Paleta tem no mínimo 4 cores: primária, secundária, accent e neutro — todos com hex codes"
        - "Par tipográfico especificado com nome exato das fontes (Google Fonts) e escala de tamanhos"
        - "Mockup renderizado mostrando logo em fundo claro e escuro"
        - "Nenhum símbolo repetido de referências analisadas (árvore, coração genérico, estrela)"

  - id: "identidade-visual/agents/carla-compilacao"
    name: "Carla Compilação"
    title: "Brand Kit Builder"
    icon: "📋"
    execution: "subagent"
    skills:
      - image-creator
    tasks:
      - name: "montar-brand-guide"
        file: "tasks/montar-brand-guide.md"
        description: "Compila todos os elementos aprovados em um brand guide HTML completo"
    artifacts:
      voice_guidance:
        always_use:
          - term: "brand guide"
            why: "Documento de referência para uso consistente da identidade visual"
          - term: "logo system"
            why: "O logo tem variações — principal, horizontal, reduzido, negativo"
          - term: "uso correto / uso incorreto"
            why: "O guia deve mostrar exemplos do que fazer E do que não fazer"
          - term: "aplicações da marca"
            why: "Exemplos práticos são mais úteis que regras abstratas"
          - term: "espaço de respiro do logo"
            why: "Clear space é regra obrigatória de qualquer brand guide"
        never_use:
          - term: "mais ou menos"
            why: "Brand guides têm regras precisas — valores exatos em px, pt ou mm"
          - term: "pode variar"
            why: "Inconsistência é o inimigo da identidade de marca"
          - term: "sugestão"
            why: "O brand guide estabelece regras, não sugestões"
        tone_rules:
          - "Tom do guia é autoritativo mas claro — regras devem ser compreensíveis para não-designers"
          - "Cada seção tem exemplos visuais, não só descrições textuais"
      anti_patterns:
        never_do:
          - "Entregar brand guide sem seção de uso incorreto do logo: o que não fazer é tão importante quanto o que fazer"
          - "Omitir template para WhatsApp: no Brasil, WhatsApp é canal primário de comunicação de clínicas"
          - "Usar placeholders no documento final: toda seção deve ter conteúdo real"
          - "Gerar guia sem exemplos de aplicação: cartão de visita digital, cabeçalho de Instagram, stories"
        always_do:
          - "Incluir versão do logo para fundo claro E fundo escuro"
          - "Especificar espaço mínimo de respiro do logo (clear space = altura da letra X do logotipo)"
          - "Incluir tamanho mínimo de uso do logo (nunca menor que 32px de altura)"
      quality_criteria:
        - "Brand guide tem no mínimo 6 seções: Logo System, Cores, Tipografia, Voz, Aplicações, Uso Incorreto"
        - "Cada cor tem HEX, RGB e nome descritivo"
        - "Tipografia inclui specimen mostrando heading + body com texto real"
        - "Template para WhatsApp incluído nas aplicações"
        - "Documento renderizado como HTML e salvo em output/"

  - id: "identidade-visual/agents/paulo-padrao"
    name: "Paulo Padrão"
    title: "Revisor de Qualidade"
    icon: "✅"
    execution: "inline"
    skills: []
    tasks: []
    artifacts:
      operational_framework: |
        1. Ler todos os artefatos produzidos: estratégia de marca, conceitos de logo, paleta, tipografia, brand guide
        2. Avaliar cada elemento contra os critérios de qualidade de branding (pesquisa + best-practices)
        3. Verificar consistência entre elementos: tom de voz alinha com paleta? Tipografia reforça o arquétipo?
        4. Verificar diferenciação: a identidade se destaca das referências analisadas (centrobaoba, instituto_singular)?
        5. Pontuar cada dimensão (1-10) com justificativa específica
        6. Emitir veredicto APPROVE, CONDITIONAL APPROVE ou REJECT com path to approval claro
      output_examples:
        - scenario: "Review da identidade visual completa"
          content: |
            ==============================
             VEREDICTO: CONDITIONAL APPROVE
            ==============================

            Identidade: Clínica Base — Identidade Visual Completa
            Data: 2026-05-04
            Revisão: 1 de 3

            TABELA DE PONTUAÇÃO
            | Critério | Nota | Resumo |
            |----------|------|--------|
            | Diferenciação visual | 9/10 | Paleta editorial escura rompe com padrão pastel do setor |
            | Consistência de arquétipo | 8/10 | Cuidador + Sábio presente em cores e tipografia |
            | Qualidade do logo | 7/10 | Conceito forte mas versão reduzida precisa de ajuste |
            | Paleta de cores | 9/10 | Warm charcoal + cream + bronze — premium e acolhedor |
            | Tipografia | 8/10 | Playfair + Lato — autoridade com legibilidade |
            | Completude do brand guide | 6/10 | Falta template WhatsApp |
            GERAL: 7.8/10

            MUDANÇA NECESSÁRIA:
            Incluir template de mensagem WhatsApp no brand guide — canal primário de clínicas no Brasil.

            APROVADO COM RESSALVA — implementar template WhatsApp antes de usar o guia.
      anti_patterns:
        never_do:
          - "Aprovar sem verificar diferenciação: identidade que parece com competidores é identidade que falhou"
          - "Pontuar apenas estética: consistência estratégica (arquétipo → visual) é mais importante"
          - "Dar feedback vago como 'falta algo': especificar exatamente o que está faltando e onde"
          - "Ignorar aplicações práticas: logo bonito que não funciona em WhatsApp falhou"
        always_do:
          - "Comparar com referências investigadas: a identidade deve se destacar, não se misturar"
          - "Verificar funcionamento do logo em preto e branco (testes de versatilidade)"
          - "Incluir path to approval explícito em qualquer REJECT ou CONDITIONAL APPROVE"
      quality_criteria:
        - "Todas as 4 dimensões (logo, cor, tipo, voz) avaliadas com nota e justificativa"
        - "Comparação explícita com pelo menos 2 referências investigadas"
        - "Path to approval listado para qualquer nota abaixo de 7"

pipeline:
  - step: 1
    name: "estrategia-de-marca"
    type: "agent"
    agent: "identidade-visual/agents/beatriz-branding"
    execution: "inline"
    output_file: "squads/identidade-visual/output/estrategia-de-marca.md"

  - step: 2
    name: "aprovar-estrategia"
    type: "checkpoint"

  - step: 3
    name: "criar-visuais"
    type: "agent"
    agent: "identidade-visual/agents/vitor-visual"
    execution: "inline"
    input_file: "squads/identidade-visual/output/estrategia-de-marca.md"
    output_file: "squads/identidade-visual/output/visuais-aprovados.md"

  - step: 4
    name: "aprovar-visuais"
    type: "checkpoint"

  - step: 5
    name: "montar-brandkit"
    type: "agent"
    agent: "identidade-visual/agents/carla-compilacao"
    execution: "subagent"
    model_tier: "powerful"
    input_file: "squads/identidade-visual/output/visuais-aprovados.md"
    output_file: "squads/identidade-visual/output/brand-guide.html"

  - step: 6
    name: "revisar-qualidade"
    type: "agent"
    agent: "identidade-visual/agents/paulo-padrao"
    execution: "inline"
    input_file: "squads/identidade-visual/output/brand-guide.html"
    output_file: "squads/identidade-visual/output/revisao-final.md"
    on_reject: 3

  - step: 7
    name: "aprovacao-final"
    type: "checkpoint"

investigation:
  enriched: true
  profiles_analyzed: 5
  date: "2026-05-04"
  dir: "squads/identidade-visual/_investigations"

research_brief: |
  BRANDING PARA CLÍNICA PEDIÁTRICA — RESUMO DA PESQUISA

  ARQUÉTIPOS:
  - Primário: Cuidador (Caregiver) — empatia, proteção, calor
  - Secundário: Sábio (Sage) — metodologia, conhecimento, credibilidade
  - Evitar: Herói (cria distância) e Governante (autoritarismo inadequado)

  PSICOLOGIA DE CORES:
  - Teal/verde-sálvia: confiança + crescimento — melhor âncora para TO infantil
  - Âmbar/coral como accent: calor do arquétipo Cuidador
  - Creme/off-white como neutro: premium sem frieza clínica
  - Evitar: branco clínico puro + azul frio, paleta pastel genérica, vermelho

  LOGO:
  - Critérios: simples, memorável, versátil, atemporal, adequado ao público
  - Para Clínica Base: conceito ligado a "base/fundação" ou ao Método B.A.S.E.
  - Formas arredondadas obrigatórias (acolhimento)
  - Mínimo 5 variações do logo no kit final

  TIPOGRAFIA:
  - Heading: Nunito (rounded, warm) ou Playfair Display (editorial, autoridade)
  - Body: Lato (warm neutral, legível) ou Inter
  - Máximo 2 famílias — nunca script como fonte primária
  - Suporte completo a caracteres portugueses

  BRAND KIT COMPLETO:
  - Logo system (5+ variações: principal, horizontal, reduzido, negativo, monocromático)
  - Paleta com HEX/RGB
  - Tipografia com specimen
  - Elementos gráficos secundários
  - Template WhatsApp (crítico para clínicas brasileiras)
  - Brand guide 20-60 páginas

  INVESTIGAÇÃO — PRINCIPAIS ACHADOS:
  - @lidiane.winck: paleta editorial escura (mocha + cream) + serif bold — diferenciação máxima no setor
  - @instituto_singular: teal + dark backgrounds + all-caps sans-serif — autoridade metodológica
  - Centro Baobá: verde + árvore (evitar repetir)
  - FMCSV: "Cuidar de cada criança é cuidar do país inteiro" — tagline com escala
  - Padrão do setor: pasteis genéricos = invisibilidade — diferenciar é romper

