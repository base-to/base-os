<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" width="560" height="360">
  <!-- Linha de base — representa a fundação compartilhada -->
  <line x1="10" y1="80" x2="130" y2="80" stroke="#3D2B1F" stroke-width="2"/>
  <!-- Arco externo — charcoal (clínica) -->
  <path d="M 30 80 A 40 40 0 0 1 110 80" stroke="#3D2B1F" stroke-width="3" fill="none"/>
  <!-- Arco intermediário — sálvia (mãe) -->
  <path d="M 45 80 A 25 25 0 0 1 95 80" stroke="#7C9A7C" stroke-width="3" fill="none"/>
  <!-- Arco interno — cobre (criança) -->
  <path d="M 58 80 A 12 12 0 0 1 82 80" stroke="#B87333" stroke-width="3" fill="none"/>
</svg>
