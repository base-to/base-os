<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 800px;
      overflow: hidden;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .mark {
      margin-bottom: 32px;
    }
    .separator {
      width: 80px;
      height: 3px;
      background: #1A1A1A;
      margin: 0 auto 28px;
    }
    .name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 64px;
      color: #1A1A1A;
      letter-spacing: -0.01em;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="mark">
      <svg width="520" height="335" viewBox="0 0 140 90" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="80" x2="130" y2="80" stroke="#1A1A1A" stroke-width="2"/>
        <path d="M 30 80 A 40 40 0 0 1 110 80" stroke="#1A1A1A" stroke-width="3" fill="none"/>
        <path d="M 45 80 A 25 25 0 0 1 95 80" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-opacity="0.65"/>
        <path d="M 58 80 A 12 12 0 0 1 82 80" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-opacity="0.4"/>
      </svg>
    </div>
    <div class="separator"></div>
    <div class="name">Clínica Base</div>
  </div>
</body>
</html>
