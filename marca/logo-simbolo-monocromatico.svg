<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" width="560" height="360">
  <!-- Fundo branco -->
  <rect width="140" height="90" fill="#FFFFFF"/>
  <!-- Linha de base -->
  <line x1="10" y1="80" x2="130" y2="80" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Arco externo — 100% opacidade -->
  <path d="M 30 80 A 40 40 0 0 1 110 80" stroke="#1A1A1A" stroke-width="3" fill="none"/>
  <!-- Arco intermediário — 65% opacidade -->
  <path d="M 45 80 A 25 25 0 0 1 95 80" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-opacity="0.65"/>
  <!-- Arco interno — 40% opacidade -->
  <path d="M 58 80 A 12 12 0 0 1 82 80" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-opacity="0.40"/>
</svg>
