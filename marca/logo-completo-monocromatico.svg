<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 125" width="560" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Fundo branco -->
  <rect width="140" height="125" fill="#FFFFFF"/>

  <!-- Linha de base -->
  <line x1="10" y1="80" x2="130" y2="80" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Arco externo — 100% opacidade -->
  <path d="M 30 80 A 40 40 0 0 1 110 80" stroke="#1A1A1A" stroke-width="3" fill="none"/>
  <!-- Arco intermediário — 65% opacidade -->
  <path d="M 45 80 A 25 25 0 0 1 95 80" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-opacity="0.65"/>
  <!-- Arco interno — 40% opacidade -->
  <path d="M 58 80 A 12 12 0 0 1 82 80" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-opacity="0.40"/>

  <!-- Separador -->
  <line x1="60" y1="93" x2="80" y2="93" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Nome da clínica -->
  <text
    x="70" y="116"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="700"
    font-size="18"
    fill="#1A1A1A"
    text-anchor="middle"
    letter-spacing="-0.2"
  >Clínica Base</text>
</svg>
